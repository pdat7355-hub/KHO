<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhập Kho Hương Kid</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; max-width: 500px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; margin-top: 10px; }
        .btn-ai { background: #0084ff; } .btn-save { background: #28a745; display: none; }
        #status { text-align: center; margin-top: 10px; font-weight: bold; color: #555; }
    </style>
</head>
<body>
    <div class="card">
        <h2>📦 Nhập Kho Hương Kid</h2>
        <input type="password" id="pass" placeholder="Mật khẩu">
        <textarea id="rawData" rows="4" placeholder="Nhập: Áo thun 120k size 5..."></textarea>
        <button class="btn-ai" onclick="analyze()">1. PHÂN TÍCH</button>

        <div id="preview" style="display:none; margin-top:20px;">
            <label>Tên:</label><input type="text" id="res_ten">
            <label>Giá:</label><input type="number" id="res_gia">
            <label>Size:</label><input type="text" id="res_size">
            <label>Link Ảnh:</label>
            <div style="display:flex; gap:5px;">
                <input type="text" id="res_anh" style="flex:1" readonly>
                <button onclick="document.getElementById('fInp').click()" style="width:50px; background:#6c757d; margin:0">📷</button>
            </div>
            <input type="file" id="fInp" accept="image/*" capture="environment" style="display:none" onchange="uploadImg(this)">
            <button class="btn-save" id="btnSave" onclick="save()">2. XÁC NHẬN LƯU</button>
        </div>
        <div id="status"></div>
    </div>

    <script>
        const status = document.getElementById('status');

        async function analyze() {
            status.innerText = "⏳ AI đang nghĩ...";
            try {
                const res = await fetch('/api/admin/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ password: document.getElementById('pass').value, data: document.getElementById('rawData').value })
                });
                const result = await res.json();
                if(!result.success) return status.innerText = result.message;
                
                document.getElementById('preview').style.display = "block";
                document.getElementById('btnSave').style.display = "block";
                const d = result.data;
                document.getElementById('res_ten').value = d.ten || "";
                document.getElementById('res_gia').value = d.gia || "";
                document.getElementById('res_size').value = d.size || "";
                status.innerText = "✅ Đã phân tích xong!";
            } catch (e) { status.innerText = "Lỗi kết nối AI"; }
        }

        async function uploadImg(input) {
            if (!input.files[0]) return;
            const formData = new FormData(); 
            formData.append("image", input.files[0]);
            status.innerText = "⏳ Đang tải ảnh lên...";

            try {
                const res = await fetch("/api/admin/upload", { method: "POST", body: formData });
                const json = await res.json();
                if(json.success) {
                    document.getElementById('res_anh').value = json.data.url;
                    status.innerText = "✅ Đã lấy được link ảnh!";
                } else {
                    status.innerText = "❌ Lỗi tải ảnh: " + (json.message || "Kiểm tra lại Key trên Render");
                }
            } catch (e) { status.innerText = "❌ Lỗi Server không phản hồi"; }
        }

        async function save() {
            const product = {
                ten: document.getElementById('res_ten').value,
                gia: document.getElementById('res_gia').value,
                size: document.getElementById('res_size').value,
                anh: document.getElementById('res_anh').value
            };
            status.innerText = "⏳ Đang ghi vào Sheets...";
            const res = await fetch('/api/admin/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ password: document.getElementById('pass').value, product })
            });
            const result = await res.json();
            alert(result.message);
            if(result.success) location.reload();
        }
    </script>
</body>
</html>
