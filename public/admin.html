<script>
    const status = document.getElementById('status');

    async function analyze() {
        status.innerHTML = "<span style='color:blue'>⏳ AI đang nghĩ...</span>";
        try {
            const res = await fetch('/api/admin/analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    password: document.getElementById('pass').value, 
                    data: document.getElementById('rawData').value 
                })
            });
            const result = await res.json();
            
            // Hiện các ô nhập liệu
            document.getElementById('preview').style.display = "block";
            document.getElementById('btnSave').style.display = "block";
            
            document.getElementById('res_ten').value = result.ten || "";
            document.getElementById('res_gia').value = result.gia || "";
            document.getElementById('res_size').value = result.size || "";
            
            status.innerHTML = result.success ? "<span style='color:green'>✅ Đã phân tích xong!</span>" : "<span style='color:red'>❌ Lỗi: " + result.message + "</span>";
        } catch (e) {
            status.innerHTML = "<span style='color:red'>❌ Lỗi kết nối Server</span>";
        }
    }

    async function uploadImg(input) {
        if (!input.files[0]) return;
        status.innerHTML = "<span style='color:blue'>⏳ Đang tải ảnh lên ImgBB...</span>";
        const formData = new FormData();
        formData.append("image", input.files[0]);

        try {
            const res = await fetch("/api/admin/upload", { method: "POST", body: formData });
            const json = await res.json();

            if(json.success && json.data) {
                document.getElementById('res_anh').value = json.data.url;
                status.innerHTML = "<span style='color:green'>✅ Tải ảnh thành công!</span>";
            } else {
                status.innerHTML = "<span style='color:red'>❌ Lỗi tải ảnh: Hãy kiểm tra Key ImgBB trên Render</span>";
            }
        } catch (e) {
            status.innerHTML = "<span style='color:red'>❌ Server không phản hồi khi tải ảnh</span>";
        }
    }

    async function save() {
        status.innerHTML = "⏳ Đang gửi dữ liệu vào Sheets...";
        const product = {
            ten: document.getElementById('res_ten').value,
            gia: document.getElementById('res_gia').value,
            size: document.getElementById('res_size').value,
            anh: document.getElementById('res_anh').value
        };

        try {
            const res = await fetch('/api/admin/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ password: document.getElementById('pass').value, product })
            });
            const result = await res.json();
            if(result.success) {
                alert("🎉 Tuyệt vời! Đã nhập kho thành công.");
                location.reload();
            } else {
                status.innerHTML = "<span style='color:red'>❌ Lỗi: " + result.message + "</span>";
            }
        } catch (err) {
            status.innerHTML = "<span style='color:red'>❌ Lỗi lưu vào Sheets</span>";
        }
    }
</script>
