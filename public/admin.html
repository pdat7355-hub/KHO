<div id="st" style="margin: 10px 0; text-align: center; font-weight: bold; font-size: 14px;"></div>

<div id="debugBox" style="display:none; background: #fff3cd; padding: 10px; border: 1px solid #ffeeba; border-radius: 5px; font-family: monospace; font-size: 12px; margin-bottom: 10px;">
    <strong>🤖 AI gửi về:</strong> <span id="rawAiOutput"></span>
</div>

<script>
    async function analyze() {
        const s = document.getElementById('st');
        const debug = document.getElementById('debugBox');
        const raw = document.getElementById('rawAiOutput');
        
        s.innerHTML = "<span style='color:blue'>⏳ Đang gửi tin nhắn cho AI...</span>";
        debug.style.display = "none";

        try {
            const res = await fetch('/api/admin/analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    password: document.getElementById('pass').value, 
                    data: document.getElementById('rawData').value 
                })
            });
            
            const d = await res.json();
            
            // HIỆN NỘI DUNG AI GỬI VỀ ĐỂ KIỂM TRA
            debug.style.display = "block";
            raw.innerText = JSON.stringify(d); 

            if(!d.success) {
                s.innerHTML = "<span style='color:red'>❌ Lỗi: " + d.message + "</span>";
                return;
            }

            document.getElementById('form').style.display = "block";
            document.getElementById('ten').value = d.ten || "";
            document.getElementById('gia').value = d.gia || "";
            document.getElementById('size').value = d.size || "";
            
            s.innerHTML = "<span style='color:green'>✅ AI đã bóc tách xong!</span>";
        } catch (e) {
            s.innerHTML = "<span style='color:red'>❌ Không kết nối được Server</span>";
        }
    }
    // ... Giữ nguyên các hàm upload và save bên dưới ...
</script>
